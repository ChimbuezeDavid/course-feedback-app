<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Feedback System - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-8">
  <div class="max-w-md w-full mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
    
    <!-- Header - Precisely Aligned -->
    <div class="pt-10 pb-8 flex flex-col items-center text-center">
      <!-- Logo -->
      <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mb-5 shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
          <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
        </svg>
      </div>
      
      <!-- Title -->
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Course Feedback System</h1>
      <p class="text-gray-500 mt-2 text-[15px]">Login to access the feedback platform</p>
    </div>

    <div class="px-8 pb-8">
      <!-- Role Selection -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-3">I am a:</label>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="selectRole(0)" id="student-btn"
            class="role-btn flex flex-col items-center justify-center border-2 border-blue-600 bg-blue-50 rounded-2xl py-6 hover:bg-blue-50 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-600 mb-2" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span class="font-medium text-blue-700">Student</span>
          </button>

          <button onclick="selectRole(1)" id="teacher-btn"
            class="role-btn flex flex-col items-center justify-center border-2 border-gray-200 rounded-2xl py-6 hover:border-gray-300 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-gray-700 mb-2" fill="currentColor" viewBox="0 0 24 24">
              <path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/>
            </svg>
            <span class="font-medium text-gray-600">Teacher</span>
          </button>
        </div>
      </div>

      <!-- Form -->
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name (Optional):</label>
          <input type="text" id="name" 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200"
                 placeholder="Enter your name">
        </div>

        <div id="level-field" style="transition: opacity 0.2s;">
          <label class="block text-sm font-medium text-gray-700 mb-1">Your Level:</label>
          <select id="level" 
                  class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200">
            <option value="">Select your level</option>
            <option value="100">100 Level</option>
            <option value="200">200 Level</option>
            <option value="300">300 Level</option>
            <option value="400">400 Level</option>
            <option value="500">500 Level</option>
          </select>
        </div>

        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition duration-200 text-lg">
          Login
        </button>
      </form>

      <!-- Footer Note -->
      <div class="mt-6 bg-blue-50 border border-blue-100 rounded-2xl p-4 text-center">
        <p id="footer-note" class="text-sm text-blue-800">
          Students can only view and rate courses for their current level
        </p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
