<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Star rating */
    .star-group { display: flex; gap: 4px; }
    .star {
      width: 22px; height: 22px; cursor: pointer;
      color: #d1d5db; transition: color 0.15s;
    }
    .star.filled { color: #f59e0b; }
    .star:hover, .star:hover ~ .star { color: #d1d5db; }
    .star-group:hover .star { color: #f59e0b; }
    .star-group .star:hover ~ .star { color: #d1d5db !important; }

    /* Card expand animation */
    .comment-section {
      display: none;
      overflow: hidden;
    }
    .comment-section.expanded {
      display: block;
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Clickable card header hint */
    .card-header { cursor: pointer; }
    .card-header:hover .card-title { color: #2563eb; }
    .chevron { transition: transform 0.25s ease; color: #9ca3af; }
    .chevron.open { transform: rotate(180deg); }

    /* Comment textarea */
    .comment-textarea {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.875rem;
      color: #374151;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .comment-textarea:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(147,197,253,0.3); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Top Navigation -->
  <nav class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <!-- Logo: circle with graduation cap -->
      <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center shadow-sm flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
          <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-semibold text-base text-gray-900 leading-tight">University Course Feedback System</h1>
        <p id="nav-subtitle" class="text-xs text-gray-500">Student Portal</p>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <button id="nav-toggle" class="sm:hidden px-2 py-1 bg-gray-100 rounded-md">☰</button>
      <div class="hidden sm:flex items-center gap-4 nav-links">
        <a href="student-dashboard.html" class="text-sm text-gray-600 hover:text-gray-900">Courses</a>
        <a href="teacher-dashboard.html" class="text-sm text-gray-600 hover:text-gray-900">Teacher View</a>
        <a href="admin-dashboard.html" class="text-sm text-gray-600 hover:text-gray-900">Admin</a>
      </div>

      <a href="index.html"
         class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-800 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Logout
    </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-3xl mx-auto px-4 py-8">

    <!-- Welcome Banner -->
    <div id="welcome-banner" class="bg-white rounded-2xl border border-gray-200 shadow-sm px-6 py-5 flex items-center justify-between mb-8">
      <div>
        <p id="welcome-name" class="font-semibold text-gray-900 text-base">Welcome, Student</p>
        <p id="welcome-sub" class="text-sm text-gray-500 mt-0.5">Your feedback is anonymous and helps improve teaching quality</p>
      </div>
      <span id="welcome-badge" class="text-sm font-medium text-blue-700 bg-blue-100 rounded-full px-3 py-1 whitespace-nowrap ml-4">Level</span>
    </div>

    <!-- Section heading -->
    <h2 class="text-xl font-bold text-gray-900 mb-1">Your Courses</h2>
    <p class="text-sm text-gray-500 mb-6">Rate the courses you're currently taking</p>

    <!-- Course Cards -->
    <div id="courses-list" class="flex flex-col gap-5">
      <!-- Populated by JS -->
    </div>

    <!-- Submit Feedback Button -->
    <div class="flex justify-end mt-8 mb-4">
      <button id="submit-feedback-btn"
        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold px-6 py-3 rounded-2xl shadow-md transition-all duration-200 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Submit Feedback
      </button>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script src="js/student.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
